<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Berkesan Coffee</title>
  <!-- Link ke CSS eksternal -->
  <link rel="stylesheet" href="/public/assets/css/styles.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="card-container">
    <div class="promo-card">
      <div class="card-header">
        <div class="brand-badge">
          <i class="fas fa-mug-hot"></i>
          <span class="brand-name">Berkesan </span>
        </div>
        <div class="time-indicator">
          <i class="far fa-clock"></i>
        </div>
      </div>

      <div class="discount-banner">
        <a href="/order.html">
          <div class="discount-icon">
            <i class="fas fa-tags"></i>
          </div>
          <div class="discount-text">
            <span class="discount-amount">Order</span>
          </div>
        </a>
      </div>

      <div class="package-section">
        <a href="/about.html"> 
        <div class="package-badge">
          <i class="fas fa-gift"></i>
          <span>About</span>
        </div>
        </a>
      </div>

      <div class="download-app-section">
        <div class="cta-download">
          <i class="fas fa-download"></i>
          <span>Location</span>
        </div>
      </div>

      <div class="platform-row">
        <div class="platform-item">
          <i class="fab fa-gripfire"></i>
          <span>ShopeeFood</span>
          <span class="platform-sub">Berkesan Coffee</span>
        </div>
      </div>

      <div class="contact-section">
        <div class="contact-whatsapp">
          <div class="contact-icon">
            <i class="fab fa-whatsapp"></i>
          </div>
          <div class="contact-detail">
            <span class="contact-title">WhatsApp Admin</span>
            <span class="contact-hours">~Mon-Sun (08:00-22:00 WIB)~</span>
          </div>
        </div>
        <div class="contact-email">
          <div class="contact-icon">
            <i class="far fa-envelope"></i>
          </div>
          <div class="contact-detail">
            <span class="contact-title">bulk & event order (087885190765)</span>
            <span class="contact-hours">~Mon-Sun (08:00-20:00 WIB)~</span>
          </div>
        </div>
      </div>

      <div class="coffee-decor">
        <i class="fas fa-seedling"></i>
        <i class="fas fa-mug-hot"></i>
      </div>
    </div>
  </div>
</body>
</html>
